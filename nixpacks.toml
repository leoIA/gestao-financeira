[phases.setup]
nixPkgs = ["php81", "php81Extensions.mbstring", "php81Extensions.xml", "php81Extensions.pdo", "php81Extensions.pdo_mysql", "php81Extensions.pdo_pgsql", "php81Extensions.tokenizer", "php81Extensions.curl", "php81Extensions.openssl", "php81Extensions.bcmath", "php81Extensions.gd", "composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan key:generate --force",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
